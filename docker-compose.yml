services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bauwerk
      POSTGRES_PASSWORD: bauwerk
      POSTGRES_DB: bauwerk
    ports:
      - "5432:5432"
    volumes:
      - bauwerk_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bauwerk -d bauwerk"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  bauwerk_postgres:
